apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/component: poc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/component: poc
    spec:
      containers:
        - name: hermes-agent
          image: danske-spil-gambler:local
          imagePullPolicy: IfNotPresent
          command: ["/gambler", "hermes-agent"]
          envFrom:
            - configMapRef:
                name: gambler-config
          env:
            - name: APP_COMPONENT
              value: hermes-agent-poc
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: password
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: poc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: poc
  ports:
    - name: http
      port: 8080
      targetPort: http
