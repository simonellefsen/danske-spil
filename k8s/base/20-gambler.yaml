apiVersion: v1
kind: ConfigMap
metadata:
  name: gambler-config
  namespace: danske-spil
data:
  GAMBLER_OBSERVE_ONLY: "true"
  DANSKESPIL_ALLOW_REAL_MONEY_PLACEMENT: "false"
  GAMBLER_SCAN_INTERVAL_SECONDS: "900"
  GAMBLER_SCAN_LIMIT: "2"
  GAMBLER_SCAN_MAX_MARKETS: "8"
  GAMBLER_DEFAULT_STAKE: "10"
  GAMBLER_AUTO_PAPER_ENABLED: "true"
  GAMBLER_AUTO_PAPER_PER_SCAN_LIMIT: "2"
  GAMBLER_AUTO_PAPER_MAX_OPEN_EXPOSURE: "200"
  GAMBLER_SETTLEMENT_QUEUE_ENABLED: "true"
  GAMBLER_SETTLEMENT_AWAITING_GRACE_MINUTES: "0"
  GAMBLER_SETTLEMENT_QUEUE_LIMIT: "50"
  GAMBLER_SETTLEMENT_LOOKUP_COOLDOWN_MINUTES: "15"
  GAMBLER_RESULT_AGENT_ENABLED: "true"
  GAMBLER_RESULT_AGENT_PER_CYCLE_LIMIT: "10"
  GAMBLER_RESULT_AGENT_INTERVAL_SECONDS: "900"
  HERMES_AGENT_ENABLED: "true"
  HERMES_REFLECTION_INTERVAL_SECONDS: "900"
  GAMBLER_BASE_PATH: "/danske-spil"
  DATABASE_HOST: danske-spil-postgres-rw
  DATABASE_PORT: "5432"
  DATABASE_NAME: danske_spil
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gambler-api
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gambler
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gambler
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: gambler-api
          image: danske-spil-gambler:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: gambler-config
          env:
            - name: APP_COMPONENT
              value: gambler-api
            - name: GAMBLER_RESULT_AGENT_URL
              value: http://gambler-result-agent:8080
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: password
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gambler-api
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gambler-worker
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gambler
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gambler
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: gambler-worker
          image: danske-spil-gambler:local
          imagePullPolicy: IfNotPresent
          command: ["/gambler", "worker"]
          envFrom:
            - configMapRef:
                name: gambler-config
          env:
            - name: APP_COMPONENT
              value: gambler-worker
            - name: GAMBLER_RESULT_AGENT_ENABLED
              value: "false"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gambler-result-agent
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: result-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gambler
      app.kubernetes.io/component: result-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gambler
        app.kubernetes.io/component: result-agent
    spec:
      containers:
        - name: gambler-result-agent
          image: danske-spil-result-agent:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: gambler-config
          env:
            - name: APP_COMPONENT
              value: gambler-result-agent
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: danske-spil-postgres-app
                  key: password
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gambler-result-agent
  namespace: danske-spil
  labels:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: result-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gambler
    app.kubernetes.io/component: result-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
